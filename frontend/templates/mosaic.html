<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Eye — Mosaic</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            overflow: hidden;
            height: 100vh;
            background: #000;
            cursor: pointer;
        }
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 1fr;
            width: 100vw;
            height: 100vh;
            gap: 4px;
        }
        .mosaic-tile {
            position: relative;
            overflow: hidden;
        }
        .mosaic-tile img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition-property: opacity;
            transition-timing-function: ease;
        }
    </style>
</head>
<body onclick="window.location.href='/'">
    <div class="mosaic-grid" id="mosaic-grid"
         data-tag="{{ settings.dashboard_showcase_tag }}"
         data-interval="{{ settings.dashboard_showcase_interval }}"
         data-kenburns="{{ 'true' if settings.dashboard_showcase_kenburns else 'false' }}"
         data-speed="{{ settings.dashboard_mosaic_speed }}"
         data-crossfade="{{ settings.dashboard_crossfade_speed }}"></div>
    <script src="/static/js/app.js?v=76"></script>
</body>
</html>
