name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE_NAME: ${{ github.repository_owner }}/a-eye
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release
      packages: write   # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # ── Release archive ───────────────────────────────────────────────
      - name: Create release archives
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DIR="a-eye-${VERSION}"

          rsync -a . "$DIR/" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='*.sqlite'

          tar -czf "a-eye-${VERSION}.tar.gz" "$DIR/"
          zip -r  "a-eye-${VERSION}.zip"     "$DIR/"
          sha256sum "a-eye-${VERSION}.tar.gz" "a-eye-${VERSION}.zip" > checksums.txt
          echo "Created archives for ${VERSION}"

      # ── Docker ────────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "A-Eye ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            a-eye-*.tar.gz
            a-eye-*.zip
            checksums.txt
