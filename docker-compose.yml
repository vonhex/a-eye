services:
  a-eye:
    image: spaceinvaderone/a-eye
    build: .
    container_name: a-eye
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434  # Or use your server's IP
      PUID: 1000   # Set to the UID that owns your photos directory (run: id -u)
      PGID: 1000   # Set to the GID that owns your photos directory (run: id -g)
    volumes:
      - /path/to/your/photos:/photos
      - a-eye-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  a-eye-data:
